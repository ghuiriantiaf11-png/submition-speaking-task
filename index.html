
<html>
<head>
  <meta charset="UTF-8">
  <title>Speaking Recording Task</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 25px;
      background: #f5f5f5;
      text-align: center;
    }
    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 12px 20px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    #start { background: #2e7d32; color: white; }
    #stop { background: #c62828; color: white; }
    #download { background: #1565c0; color: white; }
    audio {
      margin-top: 20px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Speaking Submission</h2>

    <p><b>Record a 1–2 minute speech about:</b></p>

    <button id="start">Start Recording</button>
    <button id="stop" disabled>Stop Recording</button>

    <br>

    <audio id="audio" controls></audio>

    <br>

    <a id="download" style="display:none;" download="speaking-recording.webm">
      <button>Download Recording</button>
    </a>
  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];

    const startBtn = document.getElementById("start");
    const stopBtn = document.getElementById("stop");
    const audio = document.getElementById("audio");
    const downloadLink = document.getElementById("download");

    startBtn.onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = event => {
        audioChunks.push(event.data);
      };

      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
        const audioUrl = URL.createObjectURL(audioBlob);

        audio.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.style.display = "inline-block";
      };

      mediaRecorder.start();

      startBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
      mediaRecorder.stop();

      startBtn.disabled = false;
      stopBtn.disabled = true;
    };
  </script>

</body>
</html>
